name: m183_lb2_node
include:
  - ./compose.db.yaml
services:
  web:
      image: node:latest
      user: "node"
      working_dir: /home/node/app
      container_name: m183-lb2-web
      environment:
      - DB_HOST=m183-lb2-db
      - DB_USER=root
      - DB_PASSWORD=Some.Real.Secr3t
      - DB_NAME=m183_lb2
      - NODE_ENV=production
      ports:
        - "80:3000"
      volumes:
        - type: bind
          source: ../todo-list-node
          target: /home/node/app
      command: "npm start"